# LeKiwi omnidirectional mobile base configuration

robot:
  name: lekiwi
  type: lekiwi
  robot_type: lekiwi

  joints:
    drive:
      - left_wheel_joint
      - back_wheel_joint
      - right_wheel_joint
    all:
      - left_wheel_joint
      - back_wheel_joint
      - right_wheel_joint

  default_control_mode: teleop
  controller_startup_timeout:
    sim: 120.0
    hardware: 30.0

  control_modes:
    teleop:
      description: "Gamepad teleoperation for the LeKiwi omni base"
      description_cn: "LeKiwi 底盘手柄遥操作模式"
      controllers:
        - joint_state_broadcaster
        - imu_sensor_broadcaster
        - base_controller
      sim_controllers:
        - joint_state_broadcaster
        - base_controller
      inference:
        enabled: false
        force_disable: true
      executor:
        type: topic
        mode: teleop
        queue_size: 100
        control_frequency: 50.0

    base_navigation:
      description: "Autonomous navigation base control mode"
      description_cn: "LeKiwi 自主导航底盘控制模式"
      controllers:
        - joint_state_broadcaster
        - imu_sensor_broadcaster
        - base_controller
      sim_controllers:
        - joint_state_broadcaster
        - base_controller
      inference:
        enabled: false
      executor:
        type: topic
        mode: base_navigation
        queue_size: 100
        control_frequency: 50.0

  ros2_control:
    hardware_plugin: sts_hardware_interface/STSHardwareInterface
    port: /dev/ttySERVO
    urdf_path: $(find lekiwi_description)/urdf/base.urdf.xacro
    controllers_config: $(find robot_config)/config/lekiwi/lekiwi_controllers.yaml
    controllers:
      - joint_state_broadcaster
      - imu_sensor_broadcaster
      - base_controller
    xacro_mappings:
      serial_port: /dev/ttySERVO
      use_mock: false
      i2c_bus: 1
      i2c_addr: 28
      axis_remap: P1
      sensor_mode: NDOF

  peripherals:
    - type: camera
      name: front
      driver: camera_ros
      index: 0
      format: MJPEG
      width: 640
      height: 480
      fps: 15
      frame_id: camera
      simulation:
        embedded_sensor: true

    - type: lidar
      name: laser
      driver: ldlidar
      frame_id: laser_frame
      port: /dev/ttyLIDAR
      params:
        product_name: LDLiDAR_LD19
        laser_scan_topic_name: scan
        point_cloud_2d_topic_name: ""
        frame_id: laser_frame
        serial_baudrate: 230400
        laser_scan_dir: true
        enable_angle_crop_func: false
        angle_crop_min: 135.0
        angle_crop_max: 225.0
        range_min: 0.02
        range_max: 12.0

    - type: imu
      name: base_imu
      driver: imu_sensor_broadcaster
      frame_id: imu_frame
      topic: /imu_sensor_broadcaster/imu

  simulation:
    active_platform: gazebo

  contract:
    rate_hz: 20
    max_duration_s: 90.0

    observations:
      - key: observation.images.front
        topic: /camera/front/image_raw
        type: sensor_msgs/msg/Image
        peripheral: front
        image:
          resize: [480, 640]
        align:
          strategy: hold
          stamp: header
          tol_ms: 500
        qos:
          reliability: best_effort
          history: keep_last
          depth: 10

      - key: observation.state
        topic: /base_controller/odom
        type: nav_msgs/msg/Odometry
        selector:
          names:
            - pose.pose.position.x
            - pose.pose.position.y
            - pose.pose.orientation.z
            - pose.pose.orientation.w
            - twist.twist.linear.x
            - twist.twist.linear.y
            - twist.twist.angular.z
        align:
          strategy: hold
          stamp: header
          tol_ms: 200
        qos:
          reliability: best_effort
          history: keep_last
          depth: 20

      - key: observation.state
        topic: /imu_sensor_broadcaster/imu
        type: sensor_msgs/msg/Imu
        selector:
          names:
            - orientation.x
            - orientation.y
            - orientation.z
            - orientation.w
            - angular_velocity.x
            - angular_velocity.y
            - angular_velocity.z
        align:
          strategy: hold
          stamp: header
          tol_ms: 200
        qos:
          reliability: best_effort
          history: keep_last
          depth: 20

      - key: observation.state
        topic: /joint_states
        type: sensor_msgs/msg/JointState
        selector:
          names:
            - velocity.left_wheel_joint
            - velocity.back_wheel_joint
            - velocity.right_wheel_joint
        align:
          strategy: hold
          stamp: header
          tol_ms: 200
        qos:
          reliability: best_effort
          history: keep_last
          depth: 20

    actions:
      - key: action
        publish:
          topic: /base_controller/cmd_vel
          type: geometry_msgs/msg/TwistStamped
          qos:
            reliability: best_effort
            history: keep_last
            depth: 10
          strategy:
            mode: nearest
            tolerance_ms: 200
        selector:
          names:
            - twist.linear.x
            - twist.linear.y
            - twist.angular.z
        from_tensor:
          clamp: [-1.0, 1.0]
        safety_behavior: zeros

  teleoperation:
    enabled: true
    active_device: lekiwi_gamepad
    devices:
      - name: lekiwi_gamepad
        type: joy_teleop
        config_path: $(find robot_config)/config/lekiwi/lekiwi_teleop.yaml
        input_device: /dev/input/js0
        deadzone: 0.1
        autorepeat_rate: 20.0

  navigation:
    enabled: false
    package: robot_localization
    executable: ekf_node
    node_name: ekf_node
    default_mode: full
    modes:
      full:
        config: $(find robot_config)/config/lekiwi/navigation/ekf.yaml
      odom_only:
        config: $(find robot_config)/config/lekiwi/navigation/ekf_odom.yaml
      imu_only:
        config: $(find robot_config)/config/lekiwi/navigation/ekf_imu.yaml

  recording:
    bag_base_dir: "~/rosbag/lekiwi"
    extra_topics:
      - /base_controller/odom
      - /imu_sensor_broadcaster/imu
      - /scan
